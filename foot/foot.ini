# Luke Smith-style foot config
# ~/.config/foot/foot.ini
# Transparency is handled by Hyprland — see windowrulev2 below

[main]
term=foot
font=Iosevka Nerdfont Propo:size=13
font-bold=Iosevka Nerdfont Propo:weight=Bold:size=13
dpi-aware=yes
pad=8x8
shell=/bin/zsh

[scrollback]
lines=10000
indicator-position=none

[mouse]
hide-when-typing=yes

[cursor]
style=block
blink=no

[colors-dark]
background=1d2021
foreground=ebdbb2

# Cursor colors live here now, not in [cursor]

regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

selection-foreground=ebdbb2
selection-background=504945

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
spawn-terminal=Control+Shift+n
search-start=Control+Shift+f
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[search-bindings]
find-prev=Shift+Return
find-next=Control+n
cursor-left=Left
cursor-right=Right
